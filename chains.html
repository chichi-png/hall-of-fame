<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chains — Altcoinist Inner Circle</title>

<meta property="og:title" content="Chains — Altcoinist Inner Circle" />
<meta property="og:description" content="The Inner Circle, filtered by the chain they trade." />
<meta name="twitter:card" content="summary_large_image" />
<meta property="og:image" content="https://altcoinist-affiliate.vercel.app/assets/og-hall.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:image" content="https://altcoinist-affiliate.vercel.app/assets/og-hall.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="stylesheet" href="/styles/hall.css" />
</head>
<body>

<div class="container">

  <nav class="nav">
    <a class="nav-brand" href="/">altcoinist<span class="dot">.</span> the hall of fame</a>
    <div class="nav-links">
      <a class="nav-link" href="/rankings">Rankings</a>
      <a class="nav-link active" href="/chains">Chains</a>
      <a class="nav-link" href="/reach">Reach</a>
      <a class="nav-link" href="/calls">Calls</a>
      <a class="nav-link" href="/about">About</a>
    </div>
  </nav>

  <header class="page-head">
    <div class="eyebrow">// the inner circle <span class="preview-tag">exclusive</span></div>
    <h1>Chains.</h1>
    <p>Filter the circle by the chain they trade. Find the caller for the chain you're in.</p>
  </header>

  <section style="margin-top: 28px;">
    <div class="chip-row" id="chip-row"></div>
    <div id="chain-list"></div>
  </section>

  <footer class="brand-footer">
    <div>// altcoinist · chains · exclusive</div>
    <a href="/">the hall of fame &rarr;</a>
  </footer>
</div>

<script>
  const chainLabel = { sol: 'SOL', eth: 'ETH', base: 'BASE', sui: 'SUI' };
  const chainName = { sol: 'Solana', eth: 'Ethereum', base: 'Base', sui: 'Sui' };
  const chainOrder = ['sol', 'eth', 'base', 'sui'];
  function asset(u) { return /^(https?:|\/)/.test(u) ? u : '/' + u; }

  function rankSort(a, b) {
    if (a.scored !== b.scored) return a.scored ? -1 : 1;
    if (a.scored) return b.repScore - a.repScore;
    return 0;
  }

  function miniRow(a) {
    const initials = a.handle.replace('@', '').slice(0, 2).toUpperCase();
    const chain = chainLabel[a.chain] || 'in the circle';
    return `
      <a class="mini-row${a.scored ? '' : ' unscored'}" style="text-decoration:none;color:inherit;" href="/c/${a.handle.replace('@', '')}">
        <div class="mini-avatar-wrap">
          <img class="mini-avatar" src="${asset(a.avatar)}" alt="" onerror="this.outerHTML='<div class=\\'r-avatar-fallback\\'>${initials}</div>'"/>
        </div>
        <div class="mini-info">
          <div class="mini-handle">${a.handle}</div>
          <div class="mini-meta">${chain}</div>
        </div>
        <div class="mini-stat">${a.scored ? a.repScore : '<span class="unscored-tag">unscored</span>'}</div>
      </a>`;
  }

  (async () => {
    try {
      const res = await fetch('/hall-data.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('hall-data.json fetch failed: ' + res.status);
      const data = await res.json();
      const athletes = data.athletes;

      // Only show chips for chains that actually have members. Self-maintains as the roster grows.
      const present = new Set(athletes.map(a => a.chain).filter(Boolean));
      const chips = ['<button class="chip active" data-chain="all">All chains</button>']
        .concat(chainOrder.filter(c => present.has(c))
          .map(c => `<button class="chip" data-chain="${c}">${chainName[c]}</button>`));
      document.getElementById('chip-row').innerHTML = chips.join('');

      function render(chain) {
        const list = (chain === 'all' ? [...athletes] : athletes.filter(a => a.chain === chain))
          .sort(rankSort);
        document.getElementById('chain-list').innerHTML = list.length
          ? list.map(miniRow).join('')
          : `<p class="list-note">No members on this chain yet.</p>`;
      }
      render('all');

      document.querySelectorAll('[data-chain]').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('[data-chain]').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          render(chip.dataset.chain);
        });
      });
    } catch (e) {
      console.error('Chains data load failed:', e);
      document.getElementById('chain-list').innerHTML = '<p class="list-note">Circle data unavailable.</p>';
    }
  })();
</script>

</body>
</html>
