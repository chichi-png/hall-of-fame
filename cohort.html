<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Full Cohort — Altcoinist Inner Circle</title>

<meta property="og:title" content="The Full Cohort — Altcoinist Inner Circle" />
<meta property="og:description" content="Every member of the Inner Circle, ranked by rep score." />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #000000;
    --card-bg: rgba(8, 8, 8, 0.85);
    --border: rgba(255, 255, 255, 0.06);
    --border-strong: rgba(255, 255, 255, 0.12);
    --text: #ffffff;
    --text-70: rgba(255, 255, 255, 0.70);
    --text-55: rgba(255, 255, 255, 0.55);
    --text-30: rgba(255, 255, 255, 0.30);
    --brand: #38FF93;
    --brand-60: rgba(56, 255, 147, 0.60);
    --brand-30: rgba(56, 255, 147, 0.30);
    --glow-card: 0 0 30px rgba(56, 255, 147, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    min-height: 100vh;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

  /* === NAV === */
  .nav {
    padding: 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .nav-brand {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text);
    text-decoration: none;
  }
  .nav-brand .dot { color: var(--brand); }
  .nav-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-55);
    text-decoration: none;
    transition: color 200ms;
  }
  .nav-link:hover { color: var(--brand); }

  /* === HEADER === */
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--brand-60);
    margin-bottom: 14px;
  }
  .eyebrow::before { content: ''; width: 18px; height: 1px; background: var(--brand); }
  .head { padding: 60px 0 28px 0; }
  .head h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }
  .head p { color: var(--text-55); font-size: 14px; max-width: 520px; }

  /* === RANKED LIST === */
  .list { margin: 24px 0 0 0; }
  .list-head, .c-row {
    display: grid;
    grid-template-columns: 46px 40px 1fr 56px 70px 96px 80px;
    align-items: center;
    gap: 14px;
  }
  .list-head {
    padding: 0 16px 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-30);
  }
  .list-head .r-num, .list-head .r-tier, .list-head .r-score, .list-head .r-vol, .list-head .r-flw { text-align: center; }

  .c-row {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    text-decoration: none;
    color: inherit;
    border-radius: 10px;
    transition: background 200ms, border-color 200ms;
  }
  .c-row:hover { background: var(--card-bg); }

  .r-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-30);
    text-align: center;
  }
  .c-row.is-aplus .r-num { color: var(--brand-60); }
  .c-row.rank-1 .r-num { color: var(--brand); font-size: 16px; }

  .r-avatar-wrap { position: relative; width: 36px; height: 36px; }
  .r-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--border);
  }
  .c-row.is-aplus .r-avatar {
    border: 1.5px solid var(--brand);
    box-shadow: 0 0 0 1.5px #000, 0 0 0 2.5px var(--brand-30);
  }
  .r-avatar-fallback {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a3a2a, #061a10);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600; font-size: 11px; color: var(--brand);
  }

  .r-id { min-width: 0; }
  .r-handle { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .r-chain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--brand-60); margin-top: 2px;
  }

  .r-tier {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700; text-align: center;
  }
  .r-tier.aplus { color: var(--brand); }
  .r-tier.a { color: var(--text); }
  .r-tier.b { color: var(--text-70); }
  .r-tier.c { color: var(--text-55); }
  .r-tier.d { color: var(--text-30); }

  .r-score, .r-vol, .r-flw {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; text-align: center;
  }
  .r-score { color: var(--text); font-weight: 600; }
  .r-vol, .r-flw { color: var(--text-70); }

  @media (max-width: 720px) {
    .list-head, .c-row { grid-template-columns: 36px 36px 1fr 44px 56px; gap: 10px; }
    .r-vol, .list-head .r-vol { display: none; }
    .r-flw, .list-head .r-flw { display: none; }
  }

  /* Footer */
  footer.brand-footer {
    border-top: 1px solid var(--border);
    padding: 36px 0 56px 0;
    margin-top: 64px;
    color: var(--text-30);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
  }
  footer.brand-footer a { color: var(--text-30); text-decoration: none; transition: color 200ms; }
  footer.brand-footer a:hover { color: var(--brand); }
</style>
</head>
<body>

<div class="container">

  <nav class="nav">
    <a class="nav-brand" href="/">altcoinist<span class="dot">.</span> the hall of fame</a>
    <a class="nav-link" href="/">&larr; back to the wall</a>
  </nav>

  <header class="head">
    <div class="eyebrow">// the inner circle</div>
    <h1>The full cohort.</h1>
    <p>Every member, ranked by rep score. The wall shows the top nine. This is everyone.</p>
  </header>

  <section class="list">
    <div class="list-head">
      <div class="r-num">#</div>
      <div></div>
      <div>Member</div>
      <div class="r-tier">Tier</div>
      <div class="r-score">Score</div>
      <div class="r-vol">Volume</div>
      <div class="r-flw">Followers</div>
    </div>
    <div id="cohort-list"></div>
  </section>

  <footer class="brand-footer">
    <div>// altcoinist · the full cohort · preview</div>
    <a href="/">the hall of fame &rarr;</a>
  </footer>
</div>

<script>
  const chainLabel = { sol: 'SOL', eth: 'ETH', base: 'BASE', sui: 'SUI' };

  function tierClass(tier) {
    return { 'A+': 'aplus', 'A': 'a', 'B': 'b', 'C': 'c', 'D': 'd' }[tier] || 'b';
  }

  function handleSlug(handle) {
    return handle.replace('@', '');
  }

  // Root-absolute asset path so avatars resolve regardless of the page's URL depth.
  function asset(u) { return /^(https?:|\/)/.test(u) ? u : '/' + u; }

  function cohortRow(a, rank) {
    const tc = tierClass(a.repTier);
    const isAplus = a.repTier === 'A+' ? ' is-aplus' : '';
    const initials = a.handle.replace('@', '').slice(0, 2).toUpperCase();
    return `
      <a class="c-row${isAplus} rank-${rank}" href="/c/${handleSlug(a.handle)}">
        <div class="r-num">${rank}</div>
        <div class="r-avatar-wrap">
          <img class="r-avatar" src="${asset(a.avatar)}" alt="" onerror="this.outerHTML='<div class=\\'r-avatar-fallback\\'>${initials}</div>'"/>
        </div>
        <div class="r-id">
          <div class="r-handle">${a.handle}</div>
          <div class="r-chain">${chainLabel[a.chain]}</div>
        </div>
        <div class="r-tier ${tc}">${a.repTier}</div>
        <div class="r-score">${a.repScore}</div>
        <div class="r-vol">${a.vol}</div>
        <div class="r-flw">${a.followers}</div>
      </a>`;
  }

  (async () => {
    try {
      const res = await fetch('/hall-data.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('hall-data.json fetch failed: ' + res.status);
      const data = await res.json();
      const ranked = [...data.athletes].sort((a, b) => b.repScore - a.repScore);
      document.getElementById('cohort-list').innerHTML =
        ranked.map((a, i) => cohortRow(a, i + 1)).join('');
    } catch (e) {
      console.error('Cohort data load failed:', e);
      document.getElementById('cohort-list').innerHTML =
        '<p style="color: var(--text-55); font-size: 13px; font-family: \'JetBrains Mono\', monospace; padding: 16px;">Cohort data unavailable.</p>';
    }
  })();
</script>

</body>
</html>
