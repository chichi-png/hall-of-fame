<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inner Circle Member — Altcoinist Hall of Fame</title>

<meta property="og:title" content="Inner Circle Member — Altcoinist Hall of Fame" />
<meta property="og:description" content="A verified member of the Altcoinist Inner Circle." />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #000000;
    --card-bg: rgba(8, 8, 8, 0.85);
    --card-bg-strong: rgba(14, 14, 14, 0.92);
    --border: rgba(255, 255, 255, 0.06);
    --border-strong: rgba(255, 255, 255, 0.12);
    --text: #ffffff;
    --text-70: rgba(255, 255, 255, 0.70);
    --text-55: rgba(255, 255, 255, 0.55);
    --text-30: rgba(255, 255, 255, 0.30);
    --brand: #38FF93;
    --brand-80: rgba(56, 255, 147, 0.80);
    --brand-60: rgba(56, 255, 147, 0.60);
    --brand-30: rgba(56, 255, 147, 0.30);
    --brand-08: rgba(56, 255, 147, 0.08);
    --glow-card: 0 0 30px rgba(56, 255, 147, 0.08);
    --glow-strong: 0 0 30px rgba(56, 255, 147, 0.2), inset 0 0 20px rgba(56, 255, 147, 0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    min-height: 100vh;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

  /* === NAV === */
  .nav {
    padding: 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .nav-brand {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text);
    text-decoration: none;
  }
  .nav-brand .dot { color: var(--brand); }
  .nav-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-55);
    text-decoration: none;
    transition: color 200ms;
  }
  .nav-link:hover { color: var(--brand); }

  /* === PROFILE HERO === */
  .profile {
    padding: 56px 0 40px 0;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 32px;
    align-items: center;
  }
  @media (max-width: 680px) {
    .profile { grid-template-columns: 1fr; justify-items: center; text-align: center; gap: 22px; }
  }

  .p-avatar-wrap { position: relative; width: 104px; height: 104px; flex-shrink: 0; }
  .p-avatar {
    width: 104px; height: 104px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--border);
  }
  .p-avatar-fallback {
    width: 104px; height: 104px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a3a2a, #061a10);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600; font-size: 30px; color: var(--brand);
  }
  .p-avatar-wrap.verified .p-avatar,
  .p-avatar-wrap.verified .p-avatar-fallback {
    border: 2px solid var(--brand);
    box-shadow: 0 0 0 3px #000, 0 0 0 5px var(--brand-30);
  }
  .p-check {
    position: absolute;
    bottom: 2px; right: 2px;
    width: 28px; height: 28px;
    background: var(--brand);
    border-radius: 50%;
    border: 3px solid #000;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700; color: var(--bg);
  }

  .p-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--brand-60); margin-bottom: 8px;
  }
  .p-handle {
    font-size: clamp(1.8rem, 4.5vw, 2.8rem);
    font-weight: 800; letter-spacing: -0.02em; line-height: 1.05;
  }
  .p-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-55); margin-top: 10px;
  }
  .p-sub .brand { color: var(--brand-60); }

  /* === STAT STRIP === */
  .p-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  @media (max-width: 680px) { .p-stats { grid-template-columns: 1fr 1fr; } }
  .p-stat {
    padding: 22px 0;
    text-align: center;
  }
  .p-stat + .p-stat { border-left: 1px solid var(--border); }
  @media (max-width: 680px) {
    .p-stat:nth-child(3) { border-left: none; }
    .p-stat:nth-child(n+3) { border-top: 1px solid var(--border); }
  }
  .p-stat .l {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--text-30); margin-bottom: 8px;
  }
  .p-stat .v {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px; font-weight: 600; color: var(--text);
  }
  .p-stat .v.tier-aplus { color: var(--brand); }

  /* === SHARE === */
  .share-row {
    margin: 36px 0 8px 0;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .share-btn {
    display: inline-flex; align-items: center; gap: 9px;
    font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 700;
    color: var(--bg);
    background: var(--brand);
    border: none; border-radius: 999px;
    padding: 12px 22px;
    text-decoration: none;
    cursor: pointer;
    transition: all 200ms;
  }
  .share-btn:hover { box-shadow: var(--glow-strong); transform: translateY(-1px); }
  .share-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em; color: var(--text-30);
  }

  /* === SECTION DIVIDER === */
  .section-divider {
    display: flex; align-items: center; gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-30);
    margin: 56px 0 28px 0;
  }
  .section-divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, rgba(56, 255, 147, 0.25), rgba(255, 255, 255, 0.04));
  }

  /* === CALLS === */
  .call-row {
    display: grid;
    grid-template-columns: 50px 1fr auto auto;
    gap: 16px; align-items: center;
    padding: 14px 0;
    border-top: 1px solid var(--border);
  }
  .call-row:first-of-type { border-top: none; }
  .chain-pill {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--brand-80); background: var(--brand-08);
    border: 1px solid var(--brand-30); border-radius: 4px;
    padding: 4px 7px; text-align: center;
  }
  .call-ticker { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--text); }
  .call-entry { font-size: 12px; color: var(--text-55); margin-top: 2px; }
  .call-pnl { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; }
  .call-pnl.win { color: var(--brand); }
  .call-pnl.loss { color: rgba(255, 120, 120, 0.85); }
  .call-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-30); letter-spacing: 0.1em; text-align: right; min-width: 36px; }
  .calls-empty { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-55); }

  /* Footer */
  footer.brand-footer {
    border-top: 1px solid var(--border);
    padding: 36px 0 56px 0;
    margin-top: 64px;
    color: var(--text-30);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    display: flex; justify-content: space-between;
  }
  footer.brand-footer a { color: var(--text-30); text-decoration: none; transition: color 200ms; }
  footer.brand-footer a:hover { color: var(--brand); }

  .notfound { padding: 80px 0; text-align: center; }
  .notfound h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 12px; }
  .notfound p { color: var(--text-55); font-size: 14px; }
  .notfound a { color: var(--brand); text-decoration: none; }
</style>
</head>
<body>

<div class="container">

  <nav class="nav">
    <a class="nav-brand" href="/">altcoinist<span class="dot">.</span> the hall of fame</a>
    <a class="nav-link" href="/cohort">&larr; the full cohort</a>
  </nav>

  <main id="profile-root"></main>

  <footer class="brand-footer">
    <div>// altcoinist · inner circle · preview</div>
    <a href="/">the hall of fame &rarr;</a>
  </footer>
</div>

<script>
  const chainLabel = { sol: 'SOL', eth: 'ETH', base: 'BASE', sui: 'SUI' };

  function tierClass(tier) {
    return { 'A+': 'aplus', 'A': 'a', 'B': 'b', 'C': 'c', 'D': 'd' }[tier] || 'b';
  }

  // Root-absolute asset path — this page is served at /c/{handle}, so relative paths would break.
  function asset(u) { return /^(https?:|\/)/.test(u) ? u : '/' + u; }

  // Handle comes from the path (/c/handle) or ?h= for local testing.
  function getHandleSlug() {
    const fromQuery = new URLSearchParams(location.search).get('h');
    if (fromQuery) return fromQuery.replace('@', '').toLowerCase();
    const parts = location.pathname.split('/').filter(Boolean);
    const idx = parts.indexOf('c');
    if (idx !== -1 && parts[idx + 1]) return decodeURIComponent(parts[idx + 1]).replace('@', '').toLowerCase();
    return parts.length ? parts[parts.length - 1].replace('.html', '').replace('@', '').toLowerCase() : '';
  }

  function callRow(c) {
    return `
      <div class="call-row">
        <span class="chain-pill">${chainLabel[c.chain]}</span>
        <div>
          <div class="call-ticker">${c.ticker}</div>
          <div class="call-entry">entry ${c.entry}</div>
        </div>
        <div class="call-pnl ${c.pnl >= 0 ? 'win' : 'loss'}">${c.pnl >= 0 ? '+' : ''}${c.pnl}%</div>
        <div class="call-time">${c.time}</div>
      </div>`;
  }

  function shareText(a, rank) {
    if (a.repTier === 'A+') {
      return `Verified A+ in the Altcoinist Inner Circle. Rep score ${a.repScore}, ranked #${rank}. Earned by the work.`;
    }
    return `Ranked #${rank} in the Altcoinist Inner Circle. Tier ${a.repTier}, rep score ${a.repScore}.`;
  }

  function renderProfile(a, rank, calls) {
    const tc = tierClass(a.repTier);
    const verified = a.repTier === 'A+';
    const initials = a.handle.replace('@', '').slice(0, 2).toUpperCase();
    const profileUrl = location.origin + '/c/' + a.handle.replace('@', '');
    const tweetUrl = 'https://twitter.com/intent/tweet?text=' +
      encodeURIComponent(shareText(a, rank)) + '&url=' + encodeURIComponent(profileUrl);

    const avatar = `
      <div class="p-avatar-wrap ${verified ? 'verified' : ''}">
        <img class="p-avatar" src="${asset(a.avatar)}" alt="" onerror="this.outerHTML='<div class=\\'p-avatar-fallback\\'>${initials}</div>'"/>
        ${verified ? '<div class="p-check">&#10003;</div>' : ''}
      </div>`;

    const callsHtml = calls.length
      ? calls.map(callRow).join('')
      : `<p class="calls-empty">No calls logged yet in the last 30 days.</p>`;

    document.getElementById('profile-root').innerHTML = `
      <section class="profile">
        ${avatar}
        <div>
          <div class="p-eyebrow">${verified ? 'verified caller' : 'inner circle member'}</div>
          <div class="p-handle">${a.handle}</div>
          <div class="p-sub">${chainLabel[a.chain]} caller &middot; ranked <span class="brand">#${rank}</span> of the cohort</div>
        </div>
      </section>

      <section class="p-stats">
        <div class="p-stat"><div class="l">rep tier</div><div class="v ${verified ? 'tier-aplus' : ''}">${a.repTier}</div></div>
        <div class="p-stat"><div class="l">rep score</div><div class="v">${a.repScore}</div></div>
        <div class="p-stat"><div class="l">volume</div><div class="v">${a.vol}</div></div>
        <div class="p-stat"><div class="l">followers</div><div class="v">${a.followers}</div></div>
      </section>

      <div class="share-row">
        <a class="share-btn" href="${tweetUrl}" target="_blank" rel="noopener">
          Share on X
          <span aria-hidden="true">&rarr;</span>
        </a>
        <span class="share-note">peak score ${a.repPeak} &middot; refreshed weekly</span>
      </div>

      <div class="section-divider">// track record &middot; last 30 days</div>
      <section>
        ${callsHtml}
      </section>
    `;
    document.title = a.handle + ' — Altcoinist Hall of Fame';
  }

  function renderNotFound(slug) {
    document.getElementById('profile-root').innerHTML = `
      <div class="notfound">
        <h1>Member not found.</h1>
        <p>No Inner Circle member matches "${slug}". <a href="/cohort">See the full cohort &rarr;</a></p>
      </div>`;
  }

  (async () => {
    const slug = getHandleSlug();
    try {
      const res = await fetch('/hall-data.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('hall-data.json fetch failed: ' + res.status);
      const data = await res.json();
      const ranked = [...data.athletes].sort((a, b) => b.repScore - a.repScore);
      const idx = ranked.findIndex(a => a.handle.replace('@', '').toLowerCase() === slug);
      if (idx === -1) { renderNotFound(slug); return; }
      const a = ranked[idx];
      const calls = (data.calls || []).filter(c => c.caller.replace('@', '').toLowerCase() === slug);
      renderProfile(a, idx + 1, calls);
    } catch (e) {
      console.error('Profile data load failed:', e);
      renderNotFound(slug);
    }
  })();
</script>

</body>
</html>
