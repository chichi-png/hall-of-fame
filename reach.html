<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reach — Altcoinist Inner Circle</title>

<meta property="og:title" content="Reach — Altcoinist Inner Circle" />
<meta property="og:description" content="The Inner Circle, ranked by who moves the room." />
<meta name="twitter:card" content="summary_large_image" />
<meta property="og:image" content="https://altcoinist-affiliate.vercel.app/assets/og-hall.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:image" content="https://altcoinist-affiliate.vercel.app/assets/og-hall.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="stylesheet" href="/styles/hall.css" />
</head>
<body>

<div class="container">

  <nav class="nav">
    <a class="nav-brand" href="/">altcoinist<span class="dot">.</span> the hall of fame</a>
    <div class="nav-links">
      <a class="nav-link" href="/rankings">Rankings</a>
      <a class="nav-link" href="/chains">Chains</a>
      <a class="nav-link active" href="/reach">Reach</a>
      <a class="nav-link" href="/calls">Calls</a>
      <a class="nav-link" href="/about">About</a>
    </div>
  </nav>

  <header class="page-head">
    <div class="eyebrow">// the inner circle <span class="preview-tag">exclusive</span></div>
    <h1>Reach.</h1>
    <p>Who moves the room. Ranked by X followers. A single post from the top of this list moves markets.</p>
  </header>

  <section style="margin-top: 28px;">
    <div id="reach-list"></div>
  </section>

  <footer class="brand-footer">
    <div>// altcoinist · reach · exclusive</div>
    <a href="/">the hall of fame &rarr;</a>
  </footer>
</div>

<script>
  const chainLabel = { sol: 'SOL', eth: 'ETH', base: 'BASE', sui: 'SUI' };
  function asset(u) { return /^(https?:|\/)/.test(u) ? u : '/' + u; }

  function miniRow(a, rank) {
    const initials = a.handle.replace('@', '').slice(0, 2).toUpperCase();
    const chain = chainLabel[a.chain] || '';
    const repBit = a.scored ? `rep ${a.repScore}` : 'unscored';
    const meta = [chain, repBit].filter(Boolean).join(' · ');
    return `
      <a class="mini-row${a.scored ? '' : ' unscored'}" style="text-decoration:none;color:inherit;" href="/c/${a.handle.replace('@', '')}">
        <div class="mini-rank">${rank}</div>
        <div class="mini-avatar-wrap">
          <img class="mini-avatar" src="${asset(a.avatar)}" alt="" onerror="this.outerHTML='<div class=\\'r-avatar-fallback\\'>${initials}</div>'"/>
        </div>
        <div class="mini-info">
          <div class="mini-handle">${a.handle}</div>
          <div class="mini-meta">${meta}</div>
        </div>
        <div class="mini-stat">${a.followers || '—'}</div>
      </a>`;
  }

  function followerCount(f) {
    if (!f) return -1;
    const n = parseFloat(f);
    if (isNaN(n)) return -1;
    if (/M/i.test(f)) return n * 1e6;
    if (/K/i.test(f)) return n * 1e3;
    return n;
  }

  (async () => {
    try {
      const res = await fetch('/hall-data.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('hall-data.json fetch failed: ' + res.status);
      const data = await res.json();
      const byReach = [...data.athletes].sort((a, b) => followerCount(b.followers) - followerCount(a.followers));
      document.getElementById('reach-list').innerHTML = byReach.map((a, i) => miniRow(a, i + 1)).join('');
    } catch (e) {
      console.error('Reach data load failed:', e);
      document.getElementById('reach-list').innerHTML = '<p class="list-note">Circle data unavailable.</p>';
    }
  })();
</script>

</body>
</html>
