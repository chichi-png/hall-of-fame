<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rankings — Altcoinist Inner Circle</title>
<meta name="description" content="The full Altcoinist Inner Circle, ranked by on-chain reputation. Scored callers up top, the rest of the circle below." />

<meta property="og:title" content="Rankings — Altcoinist Inner Circle" />
<meta property="og:description" content="The full circle, ranked by rep. All-time, weekly, monthly." />
<meta name="twitter:card" content="summary_large_image" />
<meta property="og:image" content="https://altcoinist-affiliate.vercel.app/assets/og-hall.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:image" content="https://altcoinist-affiliate.vercel.app/assets/og-hall.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="stylesheet" href="/styles/hall.css" />
</head>
<body>

<div class="container">

  <nav class="nav">
    <a class="nav-brand" href="/">altcoinist<span class="dot">.</span> the hall of fame</a>
    <div class="nav-links">
      <a class="nav-link active" href="/rankings">Rankings</a>
      <a class="nav-link" href="/calls">Calls</a>
      <a class="nav-link" href="/about">About</a>
      <a class="nav-cta" href="https://t.me/altcoinist_bot?startapp=hof_nav" target="_blank" rel="noopener">Earn your way in</a>
    </div>
  </nav>

  <header class="page-head">
    <div class="eyebrow">// the inner circle <span class="preview-tag">exclusive</span></div>
    <h1>Rankings.</h1>
    <p>The full circle, ranked by rep. Scored callers up top, the rest of the circle below. Switch the view.</p>
  </header>

  <section style="margin-top: 28px;">
    <div class="chip-row" id="sort-row">
      <button class="chip active" data-sort="rep">By rep</button>
      <button class="chip" data-sort="reach">By reach</button>
    </div>
    <div class="chip-row" id="chain-row" style="margin-top: 10px;"></div>
    <div class="data-stamp" id="data-stamp" style="margin-top: 14px;"></div>
    <div id="rankings-content" style="margin-top: 18px;"><p class="loading-note">loading the circle…</p></div>
  </section>

  <footer class="brand-footer">
    <div>// altcoinist · rankings · exclusive</div>
    <a href="/">the hall of fame &rarr;</a>
  </footer>
</div>

<script>
  const chainLabel = { sol: 'SOL', eth: 'ETH', base: 'BASE', sui: 'SUI' };
  const chainName = { sol: 'Solana', eth: 'Ethereum', base: 'Base', sui: 'Sui' };
  const chainOrder = ['sol', 'eth', 'base', 'sui'];
  function asset(u) { return /^(https?:|\/)/.test(u) ? u : '/' + u; }

  let ATHLETES = [];
  const state = { sort: 'rep', chain: 'all' };

  // Rep view: scored callers first, by score. Reach view: everyone by follower count.
  function rankSort(a, b) {
    if (a.scored !== b.scored) return a.scored ? -1 : 1;
    if (a.scored) return b.repScore - a.repScore;
    return 0;
  }

  function followerCount(f) {
    if (!f) return -1;
    const n = parseFloat(f);
    if (isNaN(n)) return -1;
    if (/M/i.test(f)) return n * 1e6;
    if (/K/i.test(f)) return n * 1e3;
    return n;
  }

  function statRow(a, rank, byReach) {
    const initials = a.handle.replace('@', '').slice(0, 2).toUpperCase();
    const scored = a.scored;
    const showNum = byReach || scored;
    const top = !byReach && scored && rank <= 3 ? ` top-${rank}` : '';
    return `
      <a class="c-row${scored ? '' : ' unscored'}${top} rank-${rank}" href="/c/${a.handle.replace('@', '')}">
        <div class="r-num">${showNum ? rank : '·'}</div>
        <div class="r-avatar-wrap">
          <img class="r-avatar" src="${asset(a.avatar)}" alt="" onerror="this.outerHTML='<div class=\\'r-avatar-fallback\\'>${initials}</div>'"/>
        </div>
        <div class="r-id">
          <div class="r-handle">${a.handle}</div>
          <div class="r-chain">${chainLabel[a.chain] || (scored ? '' : 'in the circle')}</div>
        </div>
        <div class="r-score">${scored ? a.repScore : '<span class="unscored-tag">unscored</span>'}</div>
        <div class="r-vol">${scored ? (a.calls4x ?? '—') : '—'}</div>
        <div class="r-calls">${scored ? (a.calls ?? '—') : '—'}</div>
        <div class="r-flw">${a.followers || '—'}</div>
      </a>`;
  }

  function render() {
    const byReach = state.sort === 'reach';
    let list = state.chain === 'all' ? [...ATHLETES] : ATHLETES.filter(a => a.chain === state.chain);
    list.sort(byReach ? (a, b) => followerCount(b.followers) - followerCount(a.followers) : rankSort);
    const rows = list.length
      ? list.map((a, i) => {
          const row = statRow(a, i + 1, byReach);
          // In rep view, drop a divider right before the first unscored caller.
          if (!byReach && i > 0 && !a.scored && list[i - 1].scored) {
            return '<div class="rank-divider">the rest of the circle</div>' + row;
          }
          return row;
        }).join('')
      : '<p class="list-note">No members on this chain yet.</p>';
    document.getElementById('rankings-content').innerHTML = `
      <div class="list">
        <div class="list-head">
          <div class="r-num">#</div>
          <div></div>
          <div>Caller</div>
          <div class="r-score">Rep</div>
          <div class="r-vol">4x+</div>
          <div class="r-calls">Calls</div>
          <div class="r-flw">Followers</div>
        </div>
        ${rows}
      </div>`;
  }

  function buildChainChips() {
    const present = new Set(ATHLETES.map(a => a.chain).filter(Boolean));
    const chips = ['<button class="chip active" data-chain="all">All chains</button>']
      .concat(chainOrder.filter(c => present.has(c))
        .map(c => `<button class="chip" data-chain="${c}">${chainName[c]}</button>`));
    document.getElementById('chain-row').innerHTML = chips.join('');
  }

  function wireChips(rowId, key) {
    document.querySelectorAll('#' + rowId + ' .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('#' + rowId + ' .chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        state[key] = chip.dataset[key];
        render();
      });
    });
  }

  (async () => {
    try {
      const res = await fetch('/hall-data.json', { cache: 'no-store' });
      if (!res.ok) throw new Error('hall-data.json fetch failed: ' + res.status);
      const data = await res.json();
      ATHLETES = data.athletes;
      const stamp = document.getElementById('data-stamp');
      if (stamp && data.meta && data.meta.lastRefreshLabel) {
        stamp.textContent = 'circle data · ' + data.meta.lastRefreshLabel + ' · ' + (data.meta.lastRefresh || '');
      }
      buildChainChips();
      wireChips('sort-row', 'sort');
      wireChips('chain-row', 'chain');
      render();
    } catch (e) {
      console.error('Rankings data load failed:', e);
      document.getElementById('rankings-content').innerHTML = '<p class="list-note">Circle data unavailable.</p>';
    }
  })();
</script>

</body>
</html>
